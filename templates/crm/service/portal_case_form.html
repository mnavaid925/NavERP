{% extends "base.html" %}
{% block title %}New Support Ticket{% endblock %}
{% block content %}
  <div class="page-header">
    <div>
      <h1 class="page-title">New Support Ticket</h1>
      <div class="breadcrumb"><a href="{% url 'crm:portal_case_list' %}">My Tickets</a><span class="sep">›</span><span>New</span></div>
    </div>
  </div>

  <div class="card"><div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="id_subject">Subject <span class="req">*</span></label>
        <input type="text" name="subject" id="id_subject" class="form-input" maxlength="255" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="id_priority">Priority</label>
        <select name="priority" id="id_priority" class="form-select">
          {% for val, label in priority_choices %}<option value="{{ val }}"{% if val == 'medium' %} selected{% endif %}>{{ label }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="id_description">Describe your issue</label>
        <textarea name="description" id="id_description" class="form-textarea" rows="5"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit"><i data-lucide="check"></i> Submit ticket</button>
        <a href="{% url 'crm:portal_case_list' %}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div></div>
{% endblock %}
