{% extends "base_auth.html" %}
{% block title %}Survey{% endblock %}
{% block content %}
<h2>We'd love your feedback</h2>
{% if survey.responded_at %}
<p>Thank you — your response has been recorded.</p>
{% else %}
<form method="post">
  {% csrf_token %}
  <div class="form-group">
    <label class="form-label" for="id_score">How likely are you to recommend us? (0–10)</label>
    <select name="score" id="id_score" class="form-select" required>
      <option value="" selected disabled>Select a score…</option>
      {% for n in "0123456789"|make_list %}<option value="{{ n }}">{{ n }}</option>{% endfor %}
      <option value="10">10</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label" for="id_feedback_text">Comments</label>
    <textarea name="feedback_text" id="id_feedback_text" class="form-textarea" placeholder="Optional comments"></textarea>
  </div>
  <button class="btn btn-primary">Submit</button>
</form>
{% endif %}
{% endblock %}
