{% load static %}
<aside class="sidebar">
  <div class="brand">
    <img src="{% static 'img/logo.svg' %}" class="brand-logo" alt="NavERP">
    <span class="brand-name nav-label">NavERP</span>
  </div>
  <nav class="nav">
    {% for section in nav_sections %}
      {% if section.children %}
        <div class="nav-group{% if section.open %} open{% endif %}">
          <div class="nav-link">
            <i data-lucide="{{ section.icon }}"></i>
            <span class="nav-label">{{ section.label }}</span>
            <i data-lucide="chevron-right" class="nav-caret nav-label"></i>
          </div>
          <div class="nav-sub">
            {% for child in section.children %}
              {% if child.href %}
                <a href="{{ child.href }}"{% if child.is_active %} class="active"{% endif %}>{{ child.label }}</a>
              {% else %}
                <a class="nav-roadmap" title="On the roadmap">{{ child.label }} <span class="pill-soon">soon</span></a>
              {% endif %}
            {% endfor %}
          </div>
        </div>
      {% else %}
        <a href="{{ section.href }}" class="nav-link{% if section.is_active %} active{% endif %}">
          <i data-lucide="{{ section.icon }}"></i>
          <span class="nav-label">{{ section.label }}</span>
        </a>
      {% endif %}
    {% endfor %}
  </nav>
</aside>
